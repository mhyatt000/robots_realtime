version: "1"

session:
  save_root: recordings

nodes:
  - type: ViserTeleopNode
    name: franka_viser
    agent_class: robots_realtime.agents.client.franka_osc_client_cartesian:FrankaOscClientCartesianAgent
    agent_kwargs:
      viser_port: 8765
      ik_rate: 100.0
      robotiq_gripper: true
      visualize_rgbd: false
      client_host: "0.0.0.0"
      client_port: 9000
    arm_key: left
    ik_freq: 100.0
    viz_freq: 20.0
    state_topics:
      left: franka/joint_state
    image_topics:
      camera_top: camera_top/rgb

  - type: RobotNode
    name: franka
    robot_config: robot_configs/franka/franka_robotiq_gripper.yaml
    cmd_topic: franka_viser/joint_pos
    poll_freq: 500

  - type: CameraNode
    name: camera_top
    driver: ZedCamera
    device_id: "35062621"
    resolution: HD720
    fps: 15
    enable_depth: true
    extrinsics_file: configs/camera_extrinsics/autolab_franka_zed_top.yaml
