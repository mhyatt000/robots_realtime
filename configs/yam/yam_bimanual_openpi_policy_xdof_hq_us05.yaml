version: "1"

# Bimanual YAM policy deployment via an external OpenPI websocket inference server.
# The policy agent runs inference on a background thread (inference_mode: async = flat-out);
# AgentNode's consumer calls act() at poll_freq and dequeues one action per tick from the
# chunk buffer. Smoothing across chunk boundaries is handled inside the agent.
#
# Prereqs:
#   - `openpi_client` installed in this venv.
#   - OpenPI server reachable at the (ip, port) below.
#   - can_left / can_right interfaces up at 1 Mbit/s.

session:
  save_root: recordings
  # Policy-specific safety + ergonomics:
  #   - start_paused: RobotNode commands are gated on startup so the arm doesn't
  #     snap to wherever the policy thinks it should be. Hit [space] in the TUI
  #     to hand off control.
  #   - record_on_unpause: when the operator unpauses, automatically start an
  #     episode so every rollout is captured from the instant of handoff.
  start_paused: true
  record_on_unpause: true

nodes:
  - type: AgentNode
    name: openpi_policy
    agent_class: robots_realtime.agents.policy_learning.async_pi0_agent:AsyncDiffusionAgent
    #
    # ── AsyncDiffusionAgent kwargs by mode ──────────────────────────────────
    #
    # Knob                    sync     async    async_rate_limited  async_rtc          temporal_ensemble
    # ─────────────────────────────────────────────────────────────────────────────────────────────────
    # action_horizon          used     used     used                used               used
    # inference_interval_s    ignored  opt cap  REQUIRED            ignored (sched.)   ignored
    # min/max_smoothed_actions N/A*    used     used                irrelevant†        N/A‡
    # rtc_execution_horizon   N/A      N/A      N/A                 used               N/A
    # rtc_consumer_rate_hz    N/A      N/A      N/A                 used (EMA)         N/A
    # rtc_max_guidance_weight N/A      N/A      N/A                 used (clamp)       N/A
    # temporal_ensemble_k     N/A      N/A      N/A                 N/A                used
    #
    #   * sync uses openpi's ActionChunkBroker which hard-swaps chunks; no
    #     client-side blend is applied.
    #   † in async_rtc the SERVER aligns new chunks to the action_prefix, so
    #     the client-side linear-ramp blend is redundant. Leaving the knobs
    #     at their defaults is fine — they run harmlessly on the tail of the
    #     new chunk where the server guidance weight is already 0.
    #   ‡ temporal_ensemble is paper-faithful (Zhao et al. ACT): blocking
    #     inference once per consumer tick, then exp(-k * age_index) weighted
    #     average across every chunk that covers tick t. No client-side blend;
    #     replaces the linear-ramp scheme entirely. Requires
    #     inference_time < 1/poll_freq for the consumer rate to hold;
    #     otherwise the loop runs as fast as inference allows.
    #
    # inference_interval_s is a rate cap for `async` only. For `async_rtc`
    # the SCHEDULED trigger paces inference (one per chunk cycle, fired
    # when the buffer has ≈ d_est actions left), which supersedes any rate
    # cap — inference_interval_s is ignored on this path.
    #
    # async_rtc REQUIRES the matching openpi fork with sample_actions_rtc
    # and obs["action_prefix"] plumbing (openpi/src/openpi/{policies/policy.py,
    # models/pi0.py}). With stock openpi, use async or async_rate_limited.
    # temporal_ensemble works against any openpi server (stock or fork).
    #
    agent_kwargs:
      ip: 127.0.0.1
      port: 8012
      action_horizon: 20
      inference_mode: sync                 # sync | async | async_rate_limited | async_rtc | temporal_ensemble
      # inference_interval_s: 0.7                 # rate cap in seconds (None = flat-out async)
      # min_smoothed_actions: 1                 # only meaningful for async / async_rate_limited
      # max_smoothed_actions: 10                # (ignored in sync and effectively unused in async_rtc)
      # temporal_ensemble_k: 0.05               # ACT paper default; higher = more weight on older predictions (smoother, laggier)
      # rtc_execution_horizon: 22               # async_rtc only; None → server's action_horizon
      # rtc_consumer_rate_hz: 30                  # async_rtc only; converts latency → inference_delay ticks
      # Upper clamp on RTC guidance weight (server side). With the prefix now
      # normalized into model-space by Policy._rtc_action_normalizer, a
      # moderate value (1–2) should keep the guided v_t on the same side as
      # the base v_t while still tracking the prefix. If the arm is still
      # jerky, drop to 0.5. If the [rtc] log shows |corr| << |v_t| and
      # chunk-boundary jitter persists, raise to 3–5.
      # rtc_max_guidance_weight: 4.0
      # rtc_debug controls the CLIENT-side chunk-jump log. Server-side per-
      # denoising-step stats are controlled independently by the RTC_DEBUG
      # env var on the server process (those prints add real latency via
      # host-device sync so they're OFF by default):
      #   RTC_DEBUG=1 uv run scripts/serve_policy.py ...
      # To see whether the server is re-JIT'ing every inference (bad!):
      #   JAX_LOG_COMPILES=1 uv run scripts/serve_policy.py ...
      # Each compile prints one log line — you should see it at startup, then
      # once more on the first RTC inference, then nothing for subsequent ones.
      # rtc_debug: true
      # Image pre-processing MUST match the training augmentation for your
      # checkpoint. Lab42 / PI OpenPI YAM runs use center-crop (crop to a
      # min(H,W) square from centre, then resize). resize_with_pad adds
      # black bars which are OOD for the model → erratic actions.
      image_preprocess: center_crop             # center_crop | pad
      use_joint_state_as_action: false
    state_topics:
      left:  yam_left/joint_state       # flatten → left-joint_pos, left-gripper_pos
      right: yam_right/joint_state
    image_topics:
      left_camera:  camera_left/rgb     # flatten → left_camera-images-rgb
      right_camera: camera_right/rgb
      top_camera:   camera_top/rgb
    loop_mode: fixed_rate
    poll_freq: 30
    # No arm_key: action dict has "left"/"right" → fans out to openpi_policy/left_pos and /right_pos.

  - type: RobotNode
    name: yam_left
    robot_config: robot_configs/yam/xdof_hq/left.yaml
    cmd_topic: openpi_policy/left_pos
    poll_freq: 200
    ramp_duration_s: 1.5
    # startup_joint_pos: [-0.0235, 1.36242, 0.3495, 0.95763, -0.11537, -0.02913, 1.0]
    startup_joint_pos: [0.0, 0.0, 0.2, 0.3, 0.0, 0.0, 1.0]
    startup_duration_s: 2.0

  - type: RobotNode
    name: yam_right
    robot_config: robot_configs/yam/xdof_hq/right.yaml
    cmd_topic: openpi_policy/right_pos
    poll_freq: 200
    ramp_duration_s: 1.5
    # startup_joint_pos: [0.01732, 1.34234, 0.33567, 0.98454, 0.11514, 0.03717, 1.0]
    startup_joint_pos: [0.0, 0.0, 0.2, 0.3, 0.0, 0.0, 1.0]
    startup_duration_s: 2.0

  # Three Intel RealSense D405s — same station as the teleop config.
  # Swap the device_id values if the physical mounts don't match the labels.
  #
  # publish_resize shrinks the bus payload to the policy's input size
  # (224×224) so VGA frames don't get serialized + shipped over ZMQ at
  # ~921 KB ea × 3 cams × 30 Hz. The on-disk MP4 keeps the full-res frame —
  # only the bus copy is downsized. Mode MUST match the agent's
  # image_preprocess setting above so what hits the policy matches the
  # training augmentation.
  - type: CameraNode
    name: camera_top
    driver: RealSenseCamera
    device_id: "427622273494"

    resolution: VGA
    fps: 30
    publish_resize: [224, 224]
    publish_resize_mode: center_crop

  - type: CameraNode
    name: camera_left
    driver: RealSenseCamera
    device_id: "427622274156"
    resolution: VGA
    fps: 30
    publish_resize: [224, 224]
    publish_resize_mode: center_crop

  - type: CameraNode
    name: camera_right
    driver: RealSenseCamera
    device_id: "427622272101"
    resolution: VGA
    fps: 30
    publish_resize: [224, 224]
    publish_resize_mode: center_crop

  # Live viser monitor — URDF overlays + camera panels, no commands.
  - type: ViserMonitorNode
    name: viz
    port: 8080
    viz_freq: 20
    # Frames from openpi_policy/image/* are already 224×224 (center-cropped by
    # the agent). Match preview to the same square so resize_with_pad is a
    # no-op — otherwise it letterboxes with black bars.
    preview_size: [224, 224]
    auto_open_browser: true
    fullscreen: true
    up_axis: "+z"
    initial_camera_position: [-0.7, -0.31, 0.3]  # behind the arms, slightly elevated
    initial_camera_look_at:  [0.45, -0.31, 0.3]  # workspace centre between the two bases
    # Action-chunk prediction overlay: viser renders N small axes frames along
    # the FK-projected end-effector path for each arm so you can see where the
    # policy intends to take the arms over the next ~1 s of lookahead. Axes
    # shrink with chunk index (nearer future larger, farther future smaller).
    chunk_topic: openpi_policy/chunk
    n_chunk_frames: 10
    chunk_frame_axes_length: 0.03
    urdfs:
      yam_left:
        path: dependencies/i2rt/i2rt/robot_models/arm/yam/yam.urdf
        state_topic: yam_left/joint_state
        flip_joints: true
        chunk_arm_key: left                # matches the agent's chunk payload
        gripper:
          type: linear_4310
          attach_link: link_6
          # Tune if the gripper rendering looks rotated relative to the real arm.
          # body_offset_pos:       [0.0, 0.0, 0.0]
          # body_offset_quat_wxyz: [0.0, 0.0, 0.0, 1.0]   # 180° about Z = joint6 axis
      yam_right:
        path: dependencies/i2rt/i2rt/robot_models/arm/yam/yam.urdf
        state_topic: yam_right/joint_state
        flip_joints: true
        chunk_arm_key: right
        gripper:
          type: linear_4310
          attach_link: link_6
          # Tune if the gripper rendering looks rotated relative to the real arm.
          # body_offset_pos:       [0.0, 0.0, 0.0]
          # body_offset_quat_wxyz: [0.0, 0.0, 0.0, 1.0]   # 180° about Z = joint6 axis
        extrinsic:
          position: [0.0, -0.61, 0.0]
          rotation: [1.0, 0.0, 0.0, 0.0]
    # Subscribe to the agent's republished, preprocessed frames — the exact
    # images the policy consumes (post center-crop, 224×224, uint8). This
    # avoids running the preprocessing pipeline a second time inside the
    # monitor and guarantees visual fidelity to the model input.
    image_topics:
      top:   openpi_policy/image/top_camera
      left:  openpi_policy/image/left_camera
      right: openpi_policy/image/right_camera
