version: "1"

session:
  save_root: recordings
  record_topic: gello_left/record

nodes:
  - type: AgentNode
    name: gello_left
    agent_class: robots_realtime.agents.teleoperation.gello_leader_agent:GelloLeaderAgent
    agent_kwargs:
      port: /dev/ttyACM0
      robot_name: left
      include_gripper: true
      joint_signs: [-1, -1, -1, -1, -1, -1]
    arm_key: left
    loop_mode: fixed_rate
    poll_freq: 200

  - type: AgentNode
    name: gello_right
    agent_class: robots_realtime.agents.teleoperation.gello_leader_agent:GelloLeaderAgent
    agent_kwargs:
      port: /dev/ttyACM1
      robot_name: right
      include_gripper: true
      joint_signs: [-1, -1, -1, -1, -1, -1]
    arm_key: right
    loop_mode: fixed_rate
    poll_freq: 200

  - type: XdofSimNode
    name: yam
    scene: hybrid
    task: bottles
    camera_fps: 30.0
    viser_port: 8765
    vr_port: 8012
    cmd_topics:
      left: gello_left/joint_pos
      right: gello_right/joint_pos
