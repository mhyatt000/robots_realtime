version: "1"

session:
  save_root: recordings
  record_topic: yam_leader_left/record

nodes:
  # Left YAM Leader Arm (teaching handle)
  - type: AgentNode
    name: yam_leader_left
    agent_class: robots_realtime.agents.teleoperation.yam_leader_agent:YamLeaderAgent
    agent_kwargs:
      robot_config: robot_configs/yam/leader_left.yaml
      robot_name: yam_left
      include_gripper: true
      enable_button_index: -1  # -1 disables button control, always enabled
      bilateral_kp: 0.05  # Bilateral control stiffness (0.0-1.0). Set to 0.0 to disable haptic feedback.
      warmup_steps: 5  # Number of steps to wait before enabling bilateral control
      start_enabled: true  # Start enabled immediately
    state_topics:
      yam_left: yam_left/joint_state  # Subscribe to follower state for bilateral control
    loop_mode: flat_out

  # Right YAM Leader Arm (teaching handle)
  - type: AgentNode
    name: yam_leader_right
    agent_class: robots_realtime.agents.teleoperation.yam_leader_agent:YamLeaderAgent
    agent_kwargs:
      robot_config: robot_configs/yam/leader_right.yaml
      robot_name: yam_right
      include_gripper: true
      enable_button_index: -1  # -1 disables button control, always enabled
      bilateral_kp: 0.05  # Bilateral control stiffness (0.0-1.0). Set to 0.0 to disable haptic feedback.
      warmup_steps: 5  # Number of steps to wait before enabling bilateral control
      start_enabled: true  # Start enabled immediately
    state_topics:
      yam_right: yam_right/joint_state  # Subscribe to follower state for bilateral control
    loop_mode: flat_out

  # Left YAM Follower Arm
  - type: RobotNode
    name: yam_left
    robot_config: robot_configs/yam/left.yaml
    cmd_topic: yam_leader_left/joint_pos

  # Right YAM Follower Arm
  - type: RobotNode
    name: yam_right
    robot_config: robot_configs/yam/right.yaml
    cmd_topic: yam_leader_right/joint_pos

  # Optional: Camera nodes (uncomment and configure as needed)
