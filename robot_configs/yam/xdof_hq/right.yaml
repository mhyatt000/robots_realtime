_target_: robots_realtime.robots.safe_motor_chain_robot.SafeMotorChainRobot
motor_chain:
  _target_: i2rt.motor_drivers.dm_driver.DMChainCanInterface
  motor_list:
    - [0x01, "DM4340"]
    - [0x02, "DM4340"]
    - [0x03, "DM4340"]
    - [0x04, "DM4310"]
    - [0x05, "DM4310"]
    - [0x06, "DM4310"]
    - [0x07, "DM4310"]
  motor_offset: [0, 0, 0, 0, 0, 0, 0]
  motor_direction: [1, 1, 1, 1, 1, 1, 1]
  # channel: "can_right"
  channel: "can_right"
  motor_chain_name: "yam_right"
  receive_mode:
    _target_: i2rt.motor_drivers.dm_driver.ReceiveMode
    value: "p16"
xml_path: "dependencies/i2rt/i2rt/robot_models/arm/yam/yam.xml"
gravity_comp_factor: 1.3
gripper_index: 6
kp: [80, 80, 80, 10, 10, 10, 20]
kd: [5, 5, 5, 1.5, 1.5, 1.5, 0.5]
joint_limits:
  - [-2.09, 3.14]
  - [0, 3.14]
  - [0.05, 3.14]
  - [-1.35, 1.35]
  - [-1.50, 1.50]
  - [-2.00, 2.00]
# Auto-calibrate mechanical gripper limits at startup (open/close sweep at 0.2 Nm).
# Hardcoded gripper_limits cause commanded endpoints to miss the real mechanical
# stops, which makes the GripperForceLimiter escalate torque and thermally trip
# the DM4310 rotor. Auto-calibration discovers the true stops so commanding
# normalized 0 or 1 lands on a holdable position.
enable_gripper_calibration: true
limit_gripper_force: 50.0
# gripper_type: "yam_small"
